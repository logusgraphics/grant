scalar Date

interface Searchable {
  page: Int
  limit: Int
  search: String
  ids: [ID!]
}

interface Auditable {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  deletedAt: Date
}

interface Creatable {
  createdAt: String!
  updatedAt: String!
}

interface PaginatedResults {
  totalCount: Int!
  hasNextPage: Boolean!
}

enum Tenant {
  account
  organization
  project
}

enum SortOrder {
  ASC
  DESC
}

input Scope {
  tenant: Tenant!
  id: ID!
}
