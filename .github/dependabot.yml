# Dependabot: keep dependencies and GitHub Actions up to date
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # npm (root + all workspaces via pnpm-lock.yaml)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
      - 'npm'
    # One PR for all npm updates (minor, patch, major) to avoid lockfile conflicts across PRs
    groups:
      all:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
          - 'major'

  # GitHub Actions (workflows) — one PR for all action updates
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - 'dependencies'
      - 'github-actions'
