name: CI

on:
  pull_request:
    branches: [main]

# All Dependabot PRs share one concurrency group so they don't flood the runner (8 PRs = 1 job at a time, not 8). Human PRs keep per-ref isolation.
concurrency:
  group: ${{ github.actor == 'dependabot[bot]' && format('grant-{0}-dependabot', github.workflow) || format('grant-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - '.github/actions/**'
              - '.eslintrc*'
              - 'vitest.config.*'

  build-test:
    name: Lint, build, test
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      pull-requests: write # gitleaks-action default PR comments
    # Optional: skip CI for Dependabot PRs to free the runner — uncomment next line:
    # if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '24'
          pnpm-version: '8.15.0'

      # Org-owned repos need GITLEAKS_LICENSE (free key via gitleaks.io). See:
      # https://github.com/gitleaks/gitleaks-action#-announcement
      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

      - name: Audit (quick)
        run: pnpm run audit:quick
        continue-on-error: true

      - name: E2E tests
        run: pnpm test:e2e
