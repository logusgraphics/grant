name: CI

on:
  pull_request:
    branches: [main]

# All Dependabot PRs share one concurrency group so they don't flood the runner (8 PRs = 1 job at a time, not 8). Human PRs keep per-ref isolation.
concurrency:
  group: ${{ github.actor == 'dependabot[bot]' && format('grant-{0}-dependabot', github.workflow) || format('grant-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, build, test
    runs-on: self-hosted
    # Optional: skip CI for Dependabot PRs to free the runner — uncomment next line:
    # if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '24'
          pnpm-version: '8.15.0'

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

      - name: Audit (quick)
        run: pnpm run audit:quick
        continue-on-error: true

      - name: E2E tests
        run: pnpm test:e2e
