# Versions and publishes npm packages when a "Version packages" PR is merged to main.
# Publishes: @grantjs/client, @grantjs/server, @grantjs/cli (and any other packages with changesets).
name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Version and publish (@grantjs/client, server, cli)
    # Run on every push to main so that merging the "Version packages" PR (squash or merge) triggers publish.
    # When the workflow itself pushes a version commit, the re-run finds no new changesets and exits without publishing.
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check tag palette distance
        run: pnpm --filter @grantjs/constants run check:palette

      - name: Build
        run: pnpm run build:release

      - name: Test
        run: pnpm test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
