# Versions and publishes npm packages when a "Version packages" PR is merged to main.
# On push to main: single prepare job (build + test + artifact), then release and docker in parallel.
# Deploy is handled by the separate Deploy workflow (deploy.yml) triggered on completion.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip path-filter checks and run all jobs'
        type: boolean
        default: false

concurrency:
  group: grant-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      release: ${{ steps.filter.outputs.release }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      example: ${{ steps.filter.outputs.example }}
      shared: ${{ steps.filter.outputs.shared }}
      workflow_release: ${{ steps.filter.outputs.workflow_release }}
      docker_matrix: ${{ steps.matrix.outputs.docker_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - '.github/actions/**'
              - '.eslintrc*'
              - 'vitest.config.*'
              - '.github/workflows/release.yml'
              - 'charts/**'
            release:
              - '.changeset/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            api: 'apps/api/**'
            web: 'apps/web/**'
            docs: 'docs/**'
            example: 'packages/@grantjs/client/examples/nextjs/**'
            shared: 'packages/**'
            workflow_release:
              - '.github/workflows/release.yml'

      - name: Build docker matrix (from changed paths)
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          # Always initialize, so fromJSON(...) never fails if nothing matches.
          echo 'docker_matrix=[]' >> "$GITHUB_OUTPUT"

          items=()
          force="${{ inputs.force }}"
          workflow_release="${{ steps.filter.outputs.workflow_release }}"

          # Editing release.yml (e.g. tags) must republish every image so GHCR stays consistent.
          if [[ "$force" == "true" || "$workflow_release" == "true" ]]; then
            items+=( '{"image":"grant-api","file":"apps/api/Dockerfile"}' )
            items+=( '{"image":"grant-web","file":"apps/web/Dockerfile"}' )
            items+=( '{"image":"grant-docs","file":"docs/Dockerfile"}' )
            items+=( '{"image":"example-nextjs","file":"packages/@grantjs/client/examples/nextjs/Dockerfile"}' )
          else
            if [[ "${{ steps.filter.outputs.api }}" == "true" || "${{ steps.filter.outputs.shared }}" == "true" ]]; then
              items+=( '{"image":"grant-api","file":"apps/api/Dockerfile"}' )
            fi

            if [[ "${{ steps.filter.outputs.web }}" == "true" || "${{ steps.filter.outputs.shared }}" == "true" ]]; then
              items+=( '{"image":"grant-web","file":"apps/web/Dockerfile"}' )
            fi

            if [[ "${{ steps.filter.outputs.docs }}" == "true" || "${{ steps.filter.outputs.shared }}" == "true" ]]; then
              items+=( '{"image":"grant-docs","file":"docs/Dockerfile"}' )
            fi

            if [[ "${{ steps.filter.outputs.example }}" == "true" || "${{ steps.filter.outputs.shared }}" == "true" ]]; then
              items+=( '{"image":"example-nextjs","file":"packages/@grantjs/client/examples/nextjs/Dockerfile"}' )
            fi
          fi

          json="[$(IFS=,; echo "${items[*]}")]"
          echo "docker_matrix=$json" >> "$GITHUB_OUTPUT"

  prepare:
    name: Build, test, upload artifact
    runs-on: self-hosted
    needs: changes
    if: >-
      needs.changes.outputs.code == 'true'
      || needs.changes.outputs.release == 'true'
      || inputs.force == true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '24'
          pnpm-version: '8.15.0'

      - name: Build
        run: pnpm run build

      - name: Check tag palette distance
        run: pnpm --filter @grantjs/constants run check:palette

      - name: Test
        run: pnpm test

      - name: Create build artifact
        run: |
          include=()
          for p in packages/*/dist apps/web/.next apps/api/dist; do
            [ -e "$p" ] && include+=( "$p" )
          done
          if [ ${#include[@]} -eq 0 ]; then
            echo "No build outputs found" && exit 1
          fi
          tar --zstd --owner=0 --group=0 -cf build.tar.zst -C . "${include[@]}"

      - name: Upload build outputs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-outputs-${{ github.run_id }}
          path: build.tar.zst

  release:
    name: Version and publish (@grantjs/client, server, cli)
    runs-on: self-hosted
    needs: prepare
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download build outputs
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-outputs-${{ github.run_id }}
          path: build-artifacts

      - name: Restore build outputs
        run: |
          tar --zstd -xf build-artifacts/build.tar.zst -C .
          rm -rf build-artifacts

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: '8.15.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install (prefer offline)
        run: pnpm install --prefer-offline --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build and push images
    runs-on: self-hosted
    needs: [prepare, changes]
    if: needs.changes.outputs.docker_matrix != '[]'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.docker_matrix) }}
    steps:
      - name: Debug docker matrix
        run: echo '${{ needs.changes.outputs.docker_matrix }}'

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: ./.github/actions/docker-build-push
        with:
          context: .
          file: ${{ matrix.file }}
          # Stable across commits so BuildKit GHA cache reuses layers when lockfile/Dockerfiles unchanged.
          cache_scope: ${{ matrix.image }}-${{ hashFiles('pnpm-lock.yaml', 'apps/api/Dockerfile', 'apps/web/Dockerfile', 'docs/Dockerfile', 'packages/@grantjs/client/examples/nextjs/Dockerfile') }}
          image: ${{ matrix.image }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:demo
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:sha-${{ github.sha }}
          push: true
