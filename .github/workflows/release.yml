# Versions and publishes npm packages when a "Version packages" PR is merged to main.
# On push to main: single prepare job (build + test + artifact), then release and docker in parallel.
# Deploy is handled by the separate Deploy workflow (deploy.yml) triggered on completion.
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: grant-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: Build, test, upload artifact
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '24'
          pnpm-version: '8.15.0'

      - name: Build
        run: pnpm run build

      - name: Check tag palette distance
        run: pnpm --filter @grantjs/constants run check:palette

      - name: Test
        run: pnpm test

      - name: Create build artifact
        run: |
          include=()
          for p in packages/*/dist apps/web/.next apps/api/dist; do
            [ -e "$p" ] && include+=( "$p" )
          done
          if [ ${#include[@]} -eq 0 ]; then
            echo "No build outputs found" && exit 1
          fi
          tar --zstd --owner=0 --group=0 -cf build.tar.zst -C . "${include[@]}"

      - name: Upload build outputs
        uses: actions/upload-artifact@v4.4.3
        with:
          name: build-outputs-${{ github.run_id }}
          path: build.tar.zst

  release:
    name: Version and publish (@grantjs/client, server, cli)
    runs-on: self-hosted
    needs: prepare
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Download build outputs
        uses: actions/download-artifact@v4.1.3
        with:
          name: build-outputs-${{ github.run_id }}
          path: build-artifacts

      - name: Restore build outputs
        run: tar --zstd -xf build-artifacts/build.tar.zst -C .

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: '8.15.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install (prefer offline)
        run: pnpm install --prefer-offline --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build and push images
    runs-on: self-hosted
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: grant-api
            file: apps/api/Dockerfile
          - image: grant-web
            file: apps/web/Dockerfile
          - image: grant-docs
            file: docs/Dockerfile
          - image: example-nextjs
            file: packages/@grantjs/client/examples/nextjs/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: ./.github/actions/docker-build-push
        with:
          context: .
          file: ${{ matrix.file }}
          cache_scope: ${{ matrix.image }}-${{ github.sha }}
          image: ${{ matrix.image }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:demo
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:sha-${{ github.sha }}
          push: true

