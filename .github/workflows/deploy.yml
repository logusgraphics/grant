# Production deploy: runs when Release workflow completes (workflow_run).
# Only on successful push to main; manual re-runs do not deploy.
name: Deploy

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

concurrency:
  group: grant-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production
    runs-on: self-hosted
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images and deploy
        run: |
          set -e
          IMAGE_BASE="ghcr.io/${{ github.repository }}"
          docker pull "$IMAGE_BASE/grant-api:demo"
          docker pull "$IMAGE_BASE/grant-web:demo"
          docker pull "$IMAGE_BASE/grant-docs:demo"
          docker pull "$IMAGE_BASE/example-nextjs:demo"
          ./scripts/stack-deploy.sh up
          docker service update --force grant-demo_api grant-demo_web grant-demo_docs grant-demo_example-nextjs
