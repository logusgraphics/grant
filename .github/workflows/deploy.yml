# Rolling update: runs when Release workflow completes successfully.
# Pulls already-published images and updates Swarm services in-place.
# Does NOT redeploy the full stack (stack-deploy.sh); the stack must
# already be running on the self-hosted runner host.
name: Deploy

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

concurrency:
  group: grant-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Rolling update (demo)
    runs-on: self-hosted
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    permissions:
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images and rolling update
        run: |
          set -e
          IMAGE_BASE="ghcr.io/${{ github.repository }}"

          docker pull "$IMAGE_BASE/grant-api:demo"
          docker pull "$IMAGE_BASE/grant-web:demo"
          docker pull "$IMAGE_BASE/grant-docs:demo"
          docker pull "$IMAGE_BASE/example-nextjs:demo"

          docker service update --image "$IMAGE_BASE/grant-api:demo" grant-demo_api
          docker service update --image "$IMAGE_BASE/grant-web:demo" grant-demo_web
          docker service update --image "$IMAGE_BASE/grant-docs:demo" grant-demo_docs
          docker service update --image "$IMAGE_BASE/example-nextjs:demo" grant-demo_example-nextjs
