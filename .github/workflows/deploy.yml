# Build and push images to GHCR; optionally deploy demo stack via SSH.
# On push to main: ci.yml, deploy.yml, and release.yml run independently.
name: Build and Publish Images

on:
  push:
    branches: [main]

# Minimal permissions; jobs override when they need more (e.g. packages: write for push).
permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push images
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: grant-api
            dockerfile: apps/api/Dockerfile
          - name: grant-web
            dockerfile: apps/web/Dockerfile
          - name: grant-docs
            dockerfile: docs/Dockerfile
          - name: example-nextjs
            dockerfile: packages/@grantjs/client/examples/nextjs/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:demo
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:demo-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy demo stack
    runs-on: self-hosted
    needs: build-and-push
    permissions:
      contents: read
    # Opt-in: set repository variable DEMO_DEPLOY_ENABLED to 'true' and configure SSH_* secrets.
    # Server must have run once: docker login ghcr.io (PAT with read:packages).
    if: ${{ vars.DEMO_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.SSH_DEPLOY_PATH }}"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git pull origin main
            IMAGE_BASE="ghcr.io/${{ github.repository }}"
            docker pull "$IMAGE_BASE/grant-api:demo"
            docker pull "$IMAGE_BASE/grant-web:demo"
            docker pull "$IMAGE_BASE/grant-docs:demo"
            docker pull "$IMAGE_BASE/example-nextjs:demo"
            ./scripts/stack-deploy.sh up
            docker service update --force grant-demo_api grant-demo_web grant-demo_docs grant-demo_example-nextjs
