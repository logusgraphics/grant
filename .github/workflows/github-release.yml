# Creates a GitHub Release when a v* tag is pushed (agent or maintainer).
name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          if [ ! -f CHANGELOG.md ]; then
            echo "No CHANGELOG.md; using tag message only." > "$NOTES_FILE"
          else
            awk -v ver="$VERSION" '
              $0 ~ "^## " ver "$" { found=1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > "$NOTES_FILE" || true
            if [ ! -s "$NOTES_FILE" ]; then
              echo "Release v${VERSION}" > "$NOTES_FILE"
            fi
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
