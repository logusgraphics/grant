# =============================================================================
# Grant Platform – Demo deployment (demo.grant.center)
# =============================================================================
# Run with: docker compose -f docker-compose.demo.yml --env-file .env.demo up -d
#
# .env.demo is used for:
#   - Deploy time: ${VAR} in this file (e.g. POSTGRES_PASSWORD, REDIS_PASSWORD,
#     build args) are interpolated from the environment when the compose file
#     is parsed (docker compose uses --env-file; docker stack deploy has no
#     --env-file, so the deploy script sources .env.demo in a subshell).
#   - Runtime: env_file: .env.demo on the api service injects vars into the
#     api container when using "docker compose up". For "docker stack deploy",
#     Swarm does not support env_file; the api gets env from the interpolated
#     "environment:" block below.
#
# For CD: use pre-built images (image:). For local: override with build or
# build first: docker compose -f docker-compose.demo.yml build
#
# Host port mapping: from .env.demo (API_PORT, WEB_PORT, DOCS_PORT, EXAMPLE_PORT).
# Postgres and Redis are not exposed on the host (internal only).
#
# Swarm: use "docker stack deploy -c docker-compose.demo.yml grant-demo" so the
# api service runs with 2 replicas (deploy.replicas). Plain "docker compose up"
# ignores deploy; use --scale api=2 for multiple API instances without Swarm.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: grant-demo-postgres
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=300000
      - -c
      - lock_timeout=30000
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grant_demo}
      POSTGRES_USER: ${POSTGRES_USER:-grant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.demo}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-grant_user} -d ${POSTGRES_DB:-grant_demo}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - demo-network

  redis:
    image: redis:7-alpine
    container_name: grant-demo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.demo}
    volumes:
      - demo_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - demo-network

  api:
    image: ${GRANT_API_IMAGE:-ghcr.io/logusgraphics/grant/grant-api:demo}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # No container_name: required for replicas (Swarm or compose --scale)
    deploy:
      replicas: 2
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
    # List form required for Swarm; Compose also supports condition: service_healthy
    depends_on:
      - postgres
      - redis
    env_file:
      - .env.demo
    environment:
      NODE_ENV: production
    volumes:
      - demo_api_storage:/app/apps/api/storage
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${API_PORT}/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 35s
    restart: unless-stopped
    networks:
      - demo-network

  api-lb:
    image: nginx:alpine
    container_name: grant-demo-api-lb
    configs:
      - source: api_lb_conf
        target: /etc/nginx/templates/default.conf.template
    environment:
      API_PORT: ${API_PORT}
      NGINX_ENVSUBST_FILTER: API_PORT
    depends_on:
      - api
    ports:
      - target: ${API_PORT}
        published: ${API_PORT}
        protocol: tcp
        mode: host
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${API_PORT}/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
    restart: unless-stopped
    networks:
      - demo-network

  web:
    image: ${GRANT_WEB_IMAGE:-ghcr.io/logusgraphics/grant/grant-web:demo}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: grant-demo-web
    env_file:
      - .env.demo
    depends_on:
      - api
    ports:
      - target: 3000
        published: ${WEB_PORT}
        protocol: tcp
        mode: host
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - demo-network

  docs:
    image: ${GRANT_DOCS_IMAGE:-ghcr.io/logusgraphics/grant/grant-docs:demo}
    build:
      context: .
      dockerfile: docs/Dockerfile
    container_name: grant-demo-docs
    env_file:
      - .env.demo
    ports:
      - target: 8080
        published: ${DOCS_PORT}
        protocol: tcp
        mode: host
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - demo-network

  example-nextjs:
    image: ${GRANT_EXAMPLE_NEXTJS_IMAGE:-ghcr.io/logusgraphics/grant/example-nextjs:demo}
    build:
      context: .
      dockerfile: packages/@grantjs/client/examples/nextjs/Dockerfile
    container_name: grant-demo-example-nextjs
    env_file:
      - .env.demo
    depends_on:
      - api
    ports:
      - target: 3000
        published: ${EXAMPLE_PORT}
        protocol: tcp
        mode: host
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - demo-network

volumes:
  demo_postgres_data:
  demo_redis_data:
  demo_api_storage:

configs:
  api_lb_conf:
    file: ./deploy/api-lb.conf.template

networks:
  demo-network:
    # overlay required for docker stack deploy (Swarm); attachable so one-off migrate/seed can use it
    driver: overlay
    attachable: true
