# =============================================================================
# Grant Platform – Demo deployment (demo.grant.center)
# =============================================================================
# Run with:
#   docker compose -f docker-compose.demo.yml --env-file .env.demo up -d
#
# Or via the helper script (handles build + up):
#   ./scripts/stack-deploy.sh           # build + up
#   ./scripts/stack-deploy.sh down      # tear down
#
# Single entry point: the gateway (nginx) listens on one port and routes
# all traffic internally by path — API, web, docs, example app.
# The API runs with 2 replicas; the gateway round-robins across them
# using Docker's embedded DNS.
#
# Only the gateway port is published on the host. All other services
# communicate on the internal Docker network.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: grant-demo-postgres
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=300000
      - -c
      - lock_timeout=30000
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grant_demo}
      POSTGRES_USER: ${POSTGRES_USER:-grant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.demo}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-grant_user} -d ${POSTGRES_DB:-grant_demo}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - demo-network

  redis:
    image: redis:7-alpine
    container_name: grant-demo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.demo}
    volumes:
      - demo_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - demo-network

  api:
    image: ${GRANT_API_IMAGE:-ghcr.io/logusgraphics/grant/grant-api:demo}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.demo
    environment:
      NODE_ENV: production
    volumes:
      - demo_api_storage:/app/apps/api/storage
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${API_PORT}/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 35s
    restart: unless-stopped
    networks:
      - demo-network

  gateway:
    image: nginx:alpine
    container_name: grant-demo-gateway
    volumes:
      - ./deploy/gateway.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      API_PORT: ${API_PORT}
      NGINX_ENVSUBST_FILTER: API_PORT
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '${GATEWAY_PORT:-80}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - demo-network

  web:
    image: ${GRANT_WEB_IMAGE:-ghcr.io/logusgraphics/grant/grant-web:demo}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: grant-demo-web
    env_file:
      - .env.demo
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - demo-network

  docs:
    image: ${GRANT_DOCS_IMAGE:-ghcr.io/logusgraphics/grant/grant-docs:demo}
    build:
      context: .
      dockerfile: docs/Dockerfile
    container_name: grant-demo-docs
    env_file:
      - .env.demo
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - demo-network

  example-nextjs:
    image: ${GRANT_EXAMPLE_NEXTJS_IMAGE:-ghcr.io/logusgraphics/grant/example-nextjs:demo}
    build:
      context: .
      dockerfile: packages/@grantjs/client/examples/nextjs/Dockerfile
    container_name: grant-demo-example-nextjs
    env_file:
      - .env.demo
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - demo-network

volumes:
  demo_postgres_data:
  demo_redis_data:
  demo_api_storage:

networks:
  demo-network:
