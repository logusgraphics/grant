query GetUsers(
  $scope: Scope!
  $page: Int
  $limit: Int
  $sort: UserSortInput
  $search: String
  $ids: [ID!]
  $tagIds: [ID!]
) {
  users(
    scope: $scope
    page: $page
    limit: $limit
    sort: $sort
    search: $search
    ids: $ids
    tagIds: $tagIds
  ) {
    users {
      id
      name
      pictureUrl
      createdAt
      updatedAt
      roles {
        id
        name
        tags {
          id
          name
          color
          isPrimary
        }
      }
      tags {
        id
        name
        color
        isPrimary
      }
    }
    totalCount
    hasNextPage
  }
}
