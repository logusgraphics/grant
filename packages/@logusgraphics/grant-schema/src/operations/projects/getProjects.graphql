query GetProjects(
  $scope: Scope!
  $page: Int
  $limit: Int
  $sort: ProjectSortInput
  $search: String
  $ids: [ID!]
  $tagIds: [ID!]
) {
  projects(
    scope: $scope
    page: $page
    limit: $limit
    sort: $sort
    search: $search
    ids: $ids
    tagIds: $tagIds
  ) {
    projects {
      id
      name
      slug
      description
      createdAt
      updatedAt
      organizationTags {
        id
        name
        color
        isPrimary
      }
      tags {
        id
        name
        color
        isPrimary
      }
    }
    totalCount
    hasNextPage
  }
}
