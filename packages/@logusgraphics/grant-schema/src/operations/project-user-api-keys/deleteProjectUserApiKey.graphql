mutation DeleteProjectUserApiKey($input: DeleteProjectUserApiKeyInput!) {
  deleteProjectUserApiKey(input: $input) {
    id
    projectId
    userId
    clientId
    name
    description
    expiresAt
    lastUsedAt
    isRevoked
    revokedAt
    revokedBy
    createdBy
    createdAt
    updatedAt
    deletedAt
  }
}
