query GetProjectUserApiKeys(
  $projectId: ID!
  $userId: ID!
  $page: Int
  $limit: Int
  $search: String
  $sort: ProjectUserApiKeySortInput
) {
  projectUserApiKeys(
    projectId: $projectId
    userId: $userId
    page: $page
    limit: $limit
    search: $search
    sort: $sort
  ) {
    projectUserApiKeys {
      id
      projectId
      userId
      clientId
      name
      description
      expiresAt
      lastUsedAt
      isRevoked
      revokedAt
      revokedBy
      createdBy
      createdAt
      updatedAt
      deletedAt
      project {
        id
        name
      }
      user {
        id
        name
      }
    }
    totalCount
    hasNextPage
  }
}
