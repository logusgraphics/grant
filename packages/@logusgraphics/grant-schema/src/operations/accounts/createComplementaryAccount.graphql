mutation CreateComplementaryAccount($input: CreateComplementaryAccountInput!) {
  createComplementaryAccount(input: $input) {
    account {
      id
      name
      slug
      type
      ownerId
      owner {
        id
        name
      }
      createdAt
      updatedAt
    }
    accounts {
      id
      name
      slug
      type
      ownerId
      owner {
        id
        name
      }
      createdAt
      updatedAt
    }
  }
}
