type UserSession implements Auditable {
  id: ID!
  userId: ID!
  user: User
  userAuthenticationMethodId: ID!
  userAuthenticationMethod: UserAuthenticationMethod
  token: String!
  audience: String!
  expiresAt: Date!
  userAgent: String
  ipAddress: String
  lastUsedAt: Date
  createdAt: Date!
  updatedAt: Date!
  deletedAt: Date
}
