enum CdmModeStrategy {
  merge
  replace
}

enum CdmOnConflict {
  fail
  skip
  update
}

enum CdmFindBy {
  key
  id
  email
  name
  slug
}

enum CdmIfMissing {
  fail
  skip
  createNew
}

input CdmModeInput {
  strategy: CdmModeStrategy!
  onConflict: CdmOnConflict
  confirmDestructive: Boolean
}

input CdmKeyResolverInput {
  value: String!
  findBy: CdmFindBy
  ifMissing: CdmIfMissing
}

"""
Resource linked to this project (`project_resources`). Export includes catalog
resources and CDM-created rows; catalog rows use `metadata.cdmExportCatalogSnapshot`
so apply binds to existing rows. Tag keys on `tags` / `primaryTag` come from
`resource_tags` for tags that appear in `project_tags`.
"""
input ResourceCdmInput {
  key: String!
  slug: String
  name: String!
  description: String
  actions: [String!]!
  tags: [String!]
  primaryTag: String
  metadata: JSON
}

"""
Custom permission definition for this project. References a resource by opaque
`resource` key from the same document. Tag keys come from `permission_tags` for tags
in `project_tags`.
"""
input PermissionCdmInput {
  key: String!
  resource: String!
  action: String!
  name: String!
  description: String
  condition: JSON
  groups: [String!]
  tags: [String!]
  primaryTag: String
  metadata: JSON
}

input TagCdmInput {
  key: String!
  name: String!
  color: String!
  metadata: JSON
}

input GroupCdmInput {
  key: String!
  name: String!
  description: String
  permissions: [String!]
  tags: [String!]
  primaryTag: String
  metadata: JSON
}

input RoleCdmInput {
  key: String!
  name: String!
  description: String
  groups: [String!]
  """
  Permission grants for this role template. Each entry is either an opaque key
  matching `permissions[].key` in this document, or a catalog reference
  `"{resourceSlug}:{action}"` (normalized lowercase) for global/system permissions
  not listed under `permissions`.
  """
  permissions: [String!]
  tags: [String!]
  primaryTag: String
  metadata: JSON
}

input UserApiKeyCdmInput {
  key: String
  clientId: String
  clientSecret: String
  name: String
  description: String
  expiresAt: Date
  metadata: JSON
}

input UserCdmInput {
  key: CdmKeyResolverInput!
  name: String!
  roles: [String!]
  groups: [String!]
  """
  Direct permission keys or catalog refs `"{resourceSlug}:{action}"` not already
  implied by the user's roles (see `RoleCdmInput.permissions`).
  """
  permissions: [String!]
  tags: [String!]
  primaryTag: String
  apiKeys: [UserApiKeyCdmInput!]
  metadata: JSON
}

input SyncProjectPermissionsInput {
  version: Int!
  id: String
  mode: CdmModeInput!
  roles: [RoleCdmInput!]!
  users: [UserCdmInput!]!
  resources: [ResourceCdmInput!]
  permissions: [PermissionCdmInput!]
  groups: [GroupCdmInput!]
  tags: [TagCdmInput!]
}
