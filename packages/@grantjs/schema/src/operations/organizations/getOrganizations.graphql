query GetOrganizations(
  $scope: Scope!
  $page: Int
  $limit: Int
  $sort: OrganizationSortInput
  $search: String
  $ids: [ID!]
) {
  organizations(
    scope: $scope
    page: $page
    limit: $limit
    sort: $sort
    search: $search
    ids: $ids
  ) {
    organizations {
      id
      name
      slug
      requireMfaForSensitiveActions
      createdAt
      updatedAt
      tags {
        id
        name
        color
        isPrimary
      }
    }
    totalCount
    hasNextPage
  }
}
