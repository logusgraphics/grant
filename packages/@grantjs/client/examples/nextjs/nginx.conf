# Example app – serve static export at 3000 (gateway contract)
# Static files live at /usr/share/nginx/html/example/ (Next.js basePath).
# The gateway forwards the full URI (e.g. /example/…) without stripping,
# so root must be the parent and locations must include the /example prefix.
server {
  listen 3000;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;

  location /example/ {
    try_files $uri $uri.html $uri/ =404;
  }

  location = /example {
    return 302 /example/;
  }

  location ^~ /example/_next/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  error_page 404 /example/404.html;
  location = /example/404.html {
    internal;
  }
}
