# Example app – serve static export at 3000 (gateway contract)
# Static files live at /usr/share/nginx/html/example (basePath)
server {
  listen 3000;
  server_name localhost;
  root /usr/share/nginx/html/example;
  index index.html;

  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  location ~ ^/(.+)/$ {
    rewrite ^/(.+)/$ /$1.html break;
  }

  location ~ ^/_next/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
