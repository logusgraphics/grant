services:
  postgres:
    image: postgres:16-alpine
    container_name: grant-postgres
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=300000
      - -c
      - lock_timeout=30000
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grant_db}
      POSTGRES_USER: ${POSTGRES_USER:-grant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grant_password}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-grant_user} -d ${POSTGRES_DB:-grant_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - grant-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grant-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@grant.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-grant_password}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - grant-network

  redis:
    image: redis:7-alpine
    container_name: grant-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-grant_redis_password}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - grant-network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: grant-redisinsight
    ports:
      - '5540:5540'
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - grant-network

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: grant-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - grant-network

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grant-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - grant-network

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: grant-jaeger
    ports:
      - '16686:16686'
      - '14268:14268'
    environment:
      COLLECTOR_OTLP_ENABLED: ${COLLECTOR_OTLP_ENABLED:-true}
    restart: unless-stopped
    networks:
      - grant-network

  umami-db:
    image: postgres:15-alpine
    container_name: grant-umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U umami -d umami']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - grant-network

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: grant-umami
    ports:
      - '3002:3000'
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-replace-me-with-a-random-string}
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/heartbeat || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - grant-network

  api:
    image: ${GRANT_API_IMAGE:-ghcr.io/logusgraphics/grant/grant-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
      - apps/api/.env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DB_URL: postgresql://${POSTGRES_USER:-grant_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-grant_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_STRATEGY: redis
    volumes:
      - api_storage:/app/apps/api/storage
    ports:
      - '${API_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - grant-network

  web:
    image: ${GRANT_WEB_IMAGE:-ghcr.io/logusgraphics/grant/grant-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: grant-web
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - grant-network

  docs:
    image: ${GRANT_DOCS_IMAGE:-ghcr.io/logusgraphics/grant/grant-docs:latest}
    build:
      context: .
      dockerfile: docs/Dockerfile
    container_name: grant-docs
    ports:
      - '${DOCS_PORT:-5173}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - grant-network

  example-nextjs:
    image: ${GRANT_EXAMPLE_NEXTJS_IMAGE:-ghcr.io/logusgraphics/grant/example-nextjs:latest}
    build:
      context: .
      dockerfile: packages/@grantjs/client/examples/nextjs/Dockerfile
    container_name: grant-example-nextjs
    depends_on:
      - api
    ports:
      - '${EXAMPLE_PORT:-3004}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - grant-network

  gateway:
    image: nginx:alpine
    container_name: grant-gateway
    depends_on:
      - api
      - web
      - docs
      - example-nextjs
    ports:
      - '80:80'
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - grant-network

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  redisinsight_data:
  prometheus_data:
  grafana_data:
  umami_data:
  api_storage:

networks:
  grant-network:
    driver: bridge
