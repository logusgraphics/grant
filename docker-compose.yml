services:
  postgres:
    image: postgres:16-alpine
    container_name: grant-platform-postgres
    environment:
      POSTGRES_DB: grant_platform_db
      POSTGRES_USER: grant_user
      POSTGRES_PASSWORD: grant_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grant_user -d grant_platform_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - grant-platform-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grant-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@grant.dev
      PGADMIN_DEFAULT_PASSWORD: grant_password
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - grant-platform-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  grant-platform-network:
    driver: bridge
