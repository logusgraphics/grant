{{- if and (not .Values.api.existingSecretEnv) (not .Values.externalSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grant.fullname" . }}-runtime
  labels:
    {{- include "grant.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_URL: {{ include "grant.databaseUrl" . | required "externalDatabase.url is required unless api.existingSecretEnv provides DB_URL" }}
  REDIS_PASSWORD: {{ .Values.redis.password | required "redis.password is required unless api.existingSecretEnv provides REDIS_PASSWORD" }}
{{- end }}
