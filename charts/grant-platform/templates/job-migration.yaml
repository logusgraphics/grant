{{- if and .Values.migrationJob.enabled .Values.api.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "grant.fullname" . }}-bootstrap
  labels:
    {{- include "grant.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: {{ .Values.migrationJob.hookWeight | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "grant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      {{- include "grant.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      serviceAccountName: {{ include "grant.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- if .Values.externalDatabase.host }}
      initContainers:
        - name: wait-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ .Values.externalDatabase.host }} {{ .Values.externalDatabase.port | default 5432 }}; do echo waiting for postgres; sleep 2; done
      {{- end }}
      containers:
        - name: bootstrap
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          workingDir: /app/apps/api
          command:
            - node_modules/.bin/tsx
            - src/bootstrap-job.ts
          envFrom:
            - configMapRef:
                name: {{ include "grant.fullname" . }}-env
            {{- if .Values.api.existingSecretEnv }}
            - secretRef:
                name: {{ .Values.api.existingSecretEnv }}
            {{- else }}
            - secretRef:
                name: {{ include "grant.fullname" . }}-runtime
            {{- end }}
          resources:
            {{- toYaml .Values.migrationJob.resources | nindent 12 }}
{{- end }}
