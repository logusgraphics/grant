{{- if and .Values.externalSecret.enabled (not .Values.api.existingSecretEnv) }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "grant.fullname" . }}-external-secret
  labels:
    {{- include "grant.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "grant.fullname" . }}-runtime
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.remoteRef.key | required "externalSecret.remoteRef.key is required when externalSecret.enabled is true" }}
        decodingStrategy: None
{{- end }}
