{{- if and .Values.api.enabled .Values.api.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "grant.fullname" . }}-api-storage
  labels:
    {{- include "grant.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.api.persistence.size }}
  {{- with .Values.api.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
