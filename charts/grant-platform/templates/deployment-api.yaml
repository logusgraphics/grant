{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grant.fullname" . }}-api
  labels:
    {{- include "grant.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "grant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "grant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- include "grant.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "grant.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      {{- if and .Values.api.waitForDatabase.enabled .Values.externalDatabase.host }}
      initContainers:
        - name: wait-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ .Values.externalDatabase.host }} {{ .Values.externalDatabase.port | default 5432 }}; do sleep 2; done
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.config.apiPort }}
          envFrom:
            - configMapRef:
                name: {{ include "grant.fullname" . }}-env
            {{- if .Values.api.existingSecretEnv }}
            - secretRef:
                name: {{ .Values.api.existingSecretEnv }}
            {{- else }}
            - secretRef:
                name: {{ include "grant.fullname" . }}-runtime
            {{- end }}
          {{- with .Values.api.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.api.persistence.enabled }}
            - name: storage
              mountPath: {{ .Values.api.persistence.mountPath }}
            {{- end }}
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.api.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        {{- if .Values.api.persistence.enabled }}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "grant.fullname" . }}-api-storage
        {{- end }}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
