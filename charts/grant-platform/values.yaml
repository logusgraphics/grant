# =============================================================================
# Grant Platform Helm chart — single canonical public URL (global.appUrl)
# =============================================================================
# Map env names to @grantjs/env (packages/@grantjs/env/src/schema.ts).
# Production: set secrets via existingSecretEnv or external secrets operator.
# Default *.image.tag is latest (GHCR Release workflow also publishes :demo and :sha-<git>).

global:
  # Required: public https URL (e.g. https://grant.example.com) — no trailing path
  appUrl: https://grant.example.com

nameOverride: ''
fullnameOverride: ''

# Optional: pull secrets for private container registries (applied to all workloads that pull images)
# Example: [ { name: regcred } ]
imagePullSecrets: []

serviceAccount:
  create: true
  name: ''
  automountServiceAccountToken: false
  # EKS IRSA: e.g. eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/grant-api
  annotations: {}

# -----------------------------------------------------------------------------
# API
# -----------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/grant-js/grant/grant-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '2'
      memory: 2Gi
  startupProbe:
    httpGet:
      path: /health
      port: http
    failureThreshold: 60
    periodSeconds: 5
    timeoutSeconds: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 20
  # Must exceed GRACEFUL_SHUTDOWN_TIMEOUT_MS (env / ConfigMap, default 25000 ms) so SIGTERM cleanup finishes before SIGKILL
  terminationGracePeriodSeconds: 60
  # Optional lifecycle hooks, e.g. preStop: { exec: { command: ['sh','-c','sleep 5'] } }
  lifecycle: {}
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  extraVolumes:
    - name: tmp
      emptyDir: {}
  persistence:
    enabled: false
    storageClass: ''
    size: 10Gi
    mountPath: /app/apps/api/storage
  # Wait for TCP on Postgres before starting API (recommended when using bundled postgresql)
  waitForDatabase:
    enabled: true
  topologySpreadConstraints: []
  extraEnv: []
  # Optional: Secret name whose keys are env var names (e.g. DB_URL, REDIS_PASSWORD, AUTH_MFA_SECRET_ENCRYPTION_KEY)
  existingSecretEnv: ''
  # When true, no Kubernetes Secret envFrom for DB/Redis — inject secrets via a file and set GRANT_ENV_FILE (see @grantjs/env) to that path, or use only ConfigMap.
  useVaultInjectedEnv: false
  # Vault Agent inject, IRSA, etc. (merged into the API Deployment pod template)
  podAnnotations: {}

# -----------------------------------------------------------------------------
# Web (Next.js)
# -----------------------------------------------------------------------------
web:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/grant-js/grant/grant-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 1Gi
  startupProbe:
    tcpSocket:
      port: http
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraEnv: []
  podAnnotations: {}

# -----------------------------------------------------------------------------
# Docs (VitePress behind nginx)
# -----------------------------------------------------------------------------
docs:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/grant-js/grant/grant-docs
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
  extraEnv: []
  podAnnotations: {}

# -----------------------------------------------------------------------------
# Example Next.js app (/example)
# -----------------------------------------------------------------------------
example:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/grant-js/grant/example-nextjs
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 1Gi
  startupProbe:
    tcpSocket:
      port: http
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraEnv: []
  podAnnotations: {}

# -----------------------------------------------------------------------------
# Ingress — Traefik-first (docs strip prefix via Middleware); nginx supported via ingress.docs.mode
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  # Set to your cluster's IngressClass (e.g. traefik, nginx — must match your ingress controller)
  className: traefik
  # Override hostname (default: hostname from global.appUrl)
  host: ''
  # Main Ingress only (API paths, web, example). Add controller-specific timeouts / size limits here.
  annotations: {}
  # Applied to main Ingress and docs Ingress (e.g. cert-manager.io/cluster-issuer)
  extraAnnotations: {}
  tls: []
  #  - secretName: grant-tls
  #    hosts: [grant.example.com]
  docs:
    # traefik: StripPrefix Middleware + Prefix path /docs (default). nginx: regex rewrite (legacy ingress-nginx).
    mode: traefik
    nginx:
      # Extra annotations on docs Ingress only when mode=nginx (regex + rewrite-target)
      annotations: {}
    traefik:
      # Router annotations for docs Ingress (entrypoints, TLS) — adjust per cluster
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
        traefik.ingress.kubernetes.io/router.tls: 'true'
      middleware:
        # Create traefik.io/v1alpha1 Middleware with stripPrefix /docs. Set false if you manage Middleware elsewhere.
        create: true
        # Use traefik.containo.us/v1alpha1 if your cluster only exposes legacy CRDs
        apiVersion: traefik.io/v1alpha1
        # If set, used as traefik.ingress.kubernetes.io/router.middlewares (e.g. myns-my-middleware@kubernetescrd)
        existingMiddlewareRef: ''

# -----------------------------------------------------------------------------
# PodDisruptionBudget (API)
# -----------------------------------------------------------------------------
podDisruptionBudget:
  api:
    enabled: false
    minAvailable: 1

# -----------------------------------------------------------------------------
# ServiceMonitor (Prometheus Operator)
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  # METRICS_ENABLED must be true on API for /metrics to exist
  metricsPath: /metrics

# -----------------------------------------------------------------------------
# PostgreSQL — connection string (install Postgres separately or use a cloud DB)
# -----------------------------------------------------------------------------
externalDatabase:
  # postgresql://user:pass@host:5432/dbname — override via api.existingSecretEnv in production
  url: postgresql://grant_user:changeme@postgres:5432/grant_db
  # TCP host for initContainer wait (API); set to match your Postgres Service
  host: postgres
  port: 5432

# -----------------------------------------------------------------------------
# Redis — CACHE_STRATEGY=redis / BullMQ; install Redis separately or use a managed cache
# -----------------------------------------------------------------------------
redis:
  host: redis
  port: 6379
  password: changeme
  db: 0

# -----------------------------------------------------------------------------
# Cache / email defaults (override via extraEnv or existingSecretEnv)
# -----------------------------------------------------------------------------
config:
  nodeEnv: production
  apiPort: 4000
  cacheStrategy: redis
  emailProvider: console
  storageProvider: local
  jobsProvider: bullmq
  demoModeEnabled: false
  metricsEnabled: false
  systemUserId: '00000000-0000-0000-0000-000000000000'
  # Extra / override keys for the API ConfigMap (non-secret). Merged over files/api-configmap-env-defaults.yaml
  # (see apps/api/.env.example). Structured fields above + global.appUrl + redis.* still win on conflict.
  env: {}
  # Optional: extra env var names that must never be emitted in the ConfigMap (treat as secret); use if you add
  # custom keys via config.env that should only come from the runtime Secret or Vault.
  envSecretKeys: []

# -----------------------------------------------------------------------------
# External Secrets Operator — syncs to Secret named {{ fullname }}-runtime (same as generated Secret)
# Not used together with api.existingSecretEnv or api.useVaultInjectedEnv (pick one secret source).
# -----------------------------------------------------------------------------
externalSecret:
  enabled: false
  refreshInterval: 5m
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  remoteRef:
    # Backend key for dataFrom.extract (e.g. AWS Secrets Manager name)
    key: ''
