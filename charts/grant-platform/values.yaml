# =============================================================================
# Grant Platform Helm chart — single canonical public URL (global.appUrl)
# =============================================================================
# Map env names to @grantjs/env (packages/@grantjs/env/src/schema.ts).
# Production: set secrets via existingSecretEnv or external secrets operator.

global:
  # Required: public https URL (e.g. https://grant.example.com) — no trailing path
  appUrl: https://grant.example.com

nameOverride: ''
fullnameOverride: ''

# Optional: pull secrets for private container registries (applied to all workloads that pull images)
# Example: [ { name: regcred } ]
imagePullSecrets: []

serviceAccount:
  create: true
  name: ''
  automountServiceAccountToken: false

# -----------------------------------------------------------------------------
# API
# -----------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/grant-js/grant/grant-api
    tag: demo
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '2'
      memory: 2Gi
  startupProbe:
    httpGet:
      path: /health
      port: http
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  extraVolumes:
    - name: tmp
      emptyDir: {}
  persistence:
    enabled: false
    storageClass: ''
    size: 10Gi
    mountPath: /app/apps/api/storage
  # Wait for TCP on Postgres before starting API (recommended when using bundled postgresql)
  waitForDatabase:
    enabled: true
  topologySpreadConstraints: []
  extraEnv: []
  # Optional: Secret name whose keys are env var names (e.g. DB_URL, REDIS_PASSWORD, AUTH_MFA_SECRET_ENCRYPTION_KEY)
  existingSecretEnv: ''

# -----------------------------------------------------------------------------
# Web (Next.js)
# -----------------------------------------------------------------------------
web:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/grant-js/grant/grant-web
    tag: demo
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 1Gi
  startupProbe:
    tcpSocket:
      port: http
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraEnv: []

# -----------------------------------------------------------------------------
# Docs (VitePress behind nginx)
# -----------------------------------------------------------------------------
docs:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/grant-js/grant/grant-docs
    tag: demo
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
  extraEnv: []

# -----------------------------------------------------------------------------
# Example Next.js app (/example)
# -----------------------------------------------------------------------------
example:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/grant-js/grant/example-nextjs
    tag: demo
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 1Gi
  startupProbe:
    tcpSocket:
      port: http
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraEnv: []

# -----------------------------------------------------------------------------
# Ingress (ingress-nginx recommended; docs Ingress uses regex + rewrite)
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  # Override hostname (default: hostname from global.appUrl)
  host: ''
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
  # Extra annotations on main + docs Ingress (e.g. cert-manager.io/cluster-issuer: letsencrypt-prod)
  extraAnnotations: {}
  tls: []
  #  - secretName: grant-tls
  #    hosts: [grant.example.com]

# -----------------------------------------------------------------------------
# Bootstrap / migration Job (post-install, post-upgrade Helm hooks). Same image as API.
# bootstrapDatabase() uses a PostgreSQL advisory lock — safe with multiple API replicas.
# -----------------------------------------------------------------------------
migrationJob:
  enabled: true
  hookWeight: '5'
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 512Mi

# -----------------------------------------------------------------------------
# PodDisruptionBudget (API)
# -----------------------------------------------------------------------------
podDisruptionBudget:
  api:
    enabled: false
    minAvailable: 1

# -----------------------------------------------------------------------------
# ServiceMonitor (Prometheus Operator)
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  # METRICS_ENABLED must be true on API for /metrics to exist
  metricsPath: /metrics

# -----------------------------------------------------------------------------
# PostgreSQL — connection string (install Postgres separately or use a cloud DB)
# -----------------------------------------------------------------------------
externalDatabase:
  # postgresql://user:pass@host:5432/dbname — override via api.existingSecretEnv in production
  url: postgresql://grant_user:changeme@postgres:5432/grant_db
  # TCP host for initContainer wait (migration Job + API); set to match your Postgres Service
  host: postgres
  port: 5432

# -----------------------------------------------------------------------------
# Redis — CACHE_STRATEGY=redis / BullMQ; install Redis separately or use a managed cache
# -----------------------------------------------------------------------------
redis:
  host: redis
  port: 6379
  password: changeme
  db: 0

# -----------------------------------------------------------------------------
# Cache / email defaults (override via extraEnv or existingSecretEnv)
# -----------------------------------------------------------------------------
config:
  nodeEnv: production
  apiPort: 4000
  cacheStrategy: redis
  emailProvider: console
  storageProvider: local
  jobsProvider: bullmq
  demoModeEnabled: false
  metricsEnabled: false
  systemUserId: '00000000-0000-0000-0000-000000000000'
